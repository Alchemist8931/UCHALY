<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Едем Учалы</title>
    <style>
        /* --- Modern Tech Design System --- */
        :root {
            --bg-deep: #000000;
            --bg-surface: #121212;
            --bg-card: rgba(255, 255, 255, 0.03);
            --primary: #00E676; /* Neon Green */
            --primary-dim: rgba(0, 230, 118, 0.1);
            --text-main: #FFFFFF;
            --text-secondary: #8A8A8F;
            --border-color: rgba(255, 255, 255, 0.08);
            --radius-base: 14px;
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'SF Mono', 'Roboto Mono', monospace;
            
            /* Shadows & Glows */
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
            --glow-primary: 0 0 20px rgba(0, 230, 118, 0.3);
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Градиентное пятно на фоне для атмосферы */
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000000 70%);
        }

        /* --- App Container --- */
        #app {
            width: 100%;
            max-width: 420px; /* Чуть уже для идеального вида на мобильных */
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* --- Background Animated Elements --- */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(100px);
            opacity: 0.05;
            border-radius: 50%;
            z-index: 0;
            animation: float 10s infinite ease-in-out;
        }
        .bg-glow.top { top: -150px; left: -50px; }
        .bg-glow.bottom { bottom: -100px; right: -100px; background: #FFFFFF; opacity: 0.03; }

        @keyframes float {
            0%, 100% { transform: translate3d(0, 0, 0); }
            50% { transform: translate3d(20px, 20px, 0); }
        }

        /* --- Screen Logic --- */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            z-index: 1;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .screen.active {
            display: flex;
            opacity: 1;
            transform: translateY(0);
            z-index: 10;
        }

        /* --- Welcome Screen Layout --- */
        .welcome-header {
            padding: 60px 30px 20px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .brand-tag {
            display: inline-block;
            padding: 6px 12px;
            background: var(--primary-dim);
            color: var(--primary);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 230, 118, 0.2);
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #FFFFFF 0%, #B0B0B0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome-subtitle {
            color: var(--text-secondary);
            font-size: 15px;
            max-width: 280px;
            margin: 0 auto;
            line-height: 1.5;
        }

        /* --- Vehicle Visual --- */
        .vehicle-visual {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 200px;
        }

        /* Подложка под авто (дорога/тень) */
        .road-shadow {
            position: absolute;
            bottom: 40px;
            width: 80%;
            height: 40px;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.6) 0%, transparent 70%);
            filter: blur(10px);
        }

        .car-svg {
            width: 100%;
            max-width: 320px;
            z-index: 2;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
            transform: translateZ(0);
            transition: transform 0.3s ease;
        }
        
        /* --- Bottom Action Area --- */
        .action-panel {
            padding: 20px 24px 40px;
            background: linear-gradient(to top, #000000 80%, transparent);
            z-index: 10;
        }

        /* --- Forms & Cards --- */
        .form-card {
            margin: 20px;
            padding: 24px;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-base);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-card);
        }

        .input-group {
            margin-bottom: 16px;
            position: relative;
        }

        .input-label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-base);
            color: var(--text-main);
            font-size: 16px;
            font-weight: 500;
            outline: none;
            transition: all 0.2s;
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-dim);
        }

        /* --- Buttons --- */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius-base);
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
            box-shadow: 0 4px 20px rgba(0, 230, 118, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 2px 10px rgba(0, 230, 118, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            margin-top: 12px;
        }
        
        .btn-text {
            background: transparent;
            color: var(--text-secondary);
            margin-top: 10px;
            padding: 10px;
        }
        .btn-text:active { color: var(--text-main); }

        /* --- Checkbox Modern --- */
        .checkbox-item {
            display: flex;
            align-items: flex-start;
            cursor: pointer;
            user-select: none;
            margin-bottom: 20px;
        }
        
        .checkmark-box {
            width: 22px;
            height: 22px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
        }

        .checkbox-item input { display: none; }
        
        .checkbox-item input:checked + .checkmark-box {
            background: var(--primary);
            border-color: var(--primary);
        }

        .checkmark-icon {
            width: 12px;
            height: 12px;
            fill: none;
            stroke: #000;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .checkbox-item input:checked + .checkmark-box .checkmark-icon {
            opacity: 1;
        }

        .checkbox-text {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.4;
        }
        
        .checkbox-text a {
            color: var(--primary);
            text-decoration: none;
        }

        /* --- Header for Login/Register screens --- */
        .nav-header {
            padding: 20px;
            display: flex;
            align-items: center;
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .header-title-center {
            flex: 1;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            margin-right: 40px; /* Compensate back button */
        }
        
        /* Status Bar Mock (for true-to-life look) */
        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-size: 14px;
            font-weight: 600;
            color: white;
        }
    </style>
</head>
<body>

    <div id="app">
        
        <!-- Background Ambient -->
        <div class="bg-glow top"></div>
        <div class="bg-glow bottom"></div>

        <!-- SCREEN 1: WELCOME -->
        <div id="screen-welcome" class="screen active">
            <div class="status-bar">
                <span id="time">9:41</span>
                <div style="display:flex; gap:5px;">
                    <!-- Signal, Wifi, Battery Icons -->
                    <svg width="18" height="12" viewBox="0 0 18 12" fill="white"><path d="M1 9.5C1.5 9 3 8 5 8C7 8 8.5 9 9 9.5M3 11.5C3.2 11.3 4 10.5 5 10.5C6 10.5 6.8 11.3 7 11.5M0 7C0.8 6.2 2.5 5 5 5C7.5 5 9.2 6.2 10 7M12 0H18V12H12V0Z"/></svg>
                </div>
            </div>

            <div class="welcome-header">
                <div class="brand-tag">Сервис перевозок</div>
                <h1 class="welcome-title">Едем Учалы</h1>
                <p class="welcome-subtitle">Быстрые поездки по городу и междугородние рейсы в одном приложении</p>
            </div>

            <div class="vehicle-visual">
                <div class="road-shadow"></div>
                <!-- Modern SUV SVG -->
                <svg class="car-svg" viewBox="0 0 640 480" xmlns="http://www.w3.org/2000/svg">
                    <!-- Car Body Shadow -->
                    <path d="M160 300 L200 200 H440 L520 300 Z" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
                    <!-- Main Body Gradient -->
                    <defs>
                        <linearGradient id="carGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#2C2C2E;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#1C1C1E;stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#3A3A3C;stop-opacity:0.8" />
                            <stop offset="100%" style="stop-color:#1C1C1E;stop-opacity:0.9" />
                        </linearGradient>
                    </defs>
                    <!-- Car Body -->
                    <path d="M180 310 L210 210 H460 L520 310 H180 Z" fill="url(#carGrad)"/>
                    <!-- Windows -->
                    <path d="M240 210 L260 180 H380 L420 210 Z" fill="url(#glassGrad)"/>
                    <!-- Wheels -->
                    <circle cx="240" cy="320" r="32" fill="#1C1C1E" stroke="#3A3A3C" stroke-width="4"/>
                    <circle cx="240" cy="320" r="16" fill="#2C2C2E"/>
                    <circle cx="450" cy="320" r="32" fill="#1C1C1E" stroke="#3A3A3C" stroke-width="4"/>
                    <circle cx="450" cy="320" r="16" fill="#2C2C2E"/>
                    <!-- Headlights Glow -->
                    <path d="M520 290 L560 280 L560 300 L520 300 Z" fill="rgba(0,230,118,0.2)"/>
                    <path d="M180 290 L160 280 L160 300 L180 300 Z" fill="rgba(255,255,255,0.5)"/>
                    <!-- Light Beam -->
                    <path d="M560 280 L640 260 L640 320 L560 300 Z" fill="url(#beam)"/>
                    <defs>
                        <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:rgba(0,230,118,0.4);stop-opacity:1" />
                            <stop offset="100%" style="stop-color:rgba(0,230,118,0);stop-opacity:0" />
                        </linearGradient>
                    </defs>
                    <!-- Accent Lines -->
                    <path d="M185 300 L200 270 H500 L515 300" stroke="#00E676" stroke-width="1.5" fill="none" opacity="0.5"/>
                </svg>
            </div>

            <div class="action-panel">
                <button class="btn btn-primary" onclick="showScreen('screen-login')">
                    Войти в аккаунт
                </button>
                <button class="btn btn-secondary" onclick="showScreen('screen-register')">
                    Зарегистрироваться
                </button>
            </div>
        </div>

        <!-- SCREEN 2: LOGIN -->
        <div id="screen-login" class="screen">
            <div class="status-bar">
                <span>9:41</span>
                <div style="display:flex; gap:5px;"><svg width="18" height="12" viewBox="0 0 18 12" fill="white"><path d="M1 9.5C1.5 9 3 8 5 8C7 8 8.5 9 9 9.5M3 11.5C3.2 11.3 4 10.5 5 10.5C6 10.5 6.8 11.3 7 11.5M0 7C0.8 6.2 2.5 5 5 5C7.5 5 9.2 6.2 10 7M12 0H18V12H12V0Z"/></svg></div>
            </div>
            
            <div class="nav-header">
                <button class="back-btn" onclick="showScreen('screen-welcome')">‹</button>
                <div class="header-title-center">Вход</div>
            </div>

            <div class="form-card" style="margin-top: 40px;">
                <div class="input-group">
                    <label class="input-label">Номер телефона</label>
                    <input type="tel" class="input-field" placeholder="+7 (___) ___-__-__" id="login-phone">
                </div>

                <div class="input-group">
                    <label class="input-label">Код из СМС</label>
                    <input type="text" class="input-field" placeholder="----" id="login-code" maxlength="6" style="letter-spacing: 8px; text-align: center; font-family: var(--font-mono);">
                </div>

                <button class="btn btn-primary" onclick="handleLogin()">
                    Продолжить
                </button>
            </div>
        </div>

        <!-- SCREEN 3: REGISTER -->
        <div id="screen-register" class="screen">
            <div class="status-bar">
                <span>9:41</span>
                <div style="display:flex; gap:5px;"><svg width="18" height="12" viewBox="0 0 18 12" fill="white"><path d="M1 9.5C1.5 9 3 8 5 8C7 8 8.5 9 9 9.5M3 11.5C3.2 11.3 4 10.5 5 10.5C6 10.5 6.8 11.3 7 11.5M0 7C0.8 6.2 2.5 5 5 5C7.5 5 9.2 6.2 10 7M12 0H18V12H12V0Z"/></svg></div>
            </div>

            <div class="nav-header">
                <button class="back-btn" onclick="showScreen('screen-welcome')">‹</button>
                <div class="header-title-center">Регистрация</div>
            </div>

            <div class="form-card" style="margin-top: 40px;">
                <div class="input-group">
                    <label class="input-label">Ваше имя</label>
                    <input type="text" class="input-field" placeholder="Иван Иванов" id="reg-name">
                </div>

                <div class="input-group">
                    <label class="input-label">Номер телефона</label>
                    <input type="tel" class="input-field" placeholder="+7 (___) ___-__-__" id="reg-phone">
                </div>

                <label class="checkbox-item">
                    <input type="checkbox" id="terms">
                    <span class="checkmark-box">
                        <svg class="checkmark-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </span>
                    <span class="checkbox-label">
                        Я принимаю <a href="#">условия оферты</a> и <a href="#">политику конфиденциальности</a>
                    </span>
                </label>

                <button class="btn btn-primary" onclick="handleRegister()">
                    Создать аккаунт
                </button>
            </div>
        </div>

    </div>

    <script>
        // Set current time
        document.getElementById('time').innerText = new Date().toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }

        function handleLogin() {
            const phone = document.getElementById('login-phone').value;
            const code = document.getElementById('login-code').value;
            
            if(!phone) { alert("Введите номер"); return; }
            if(!code) {
                // UI Feedback instead of simple alert
                document.getElementById('login-code').parentElement.style.background = 'rgba(0, 230, 118, 0.1)';
                document.getElementById('login-code').focus();
                // Animation
                const btn = document.querySelector('#screen-login .btn-primary');
                btn.innerText = "Код отправлен ✓";
                btn.style.background = '#2C2C2E';
                btn.style.color = '#00E676';
                setTimeout(() => {
                    btn.innerText = "Продолжить";
                    btn.style.background = '';
                    btn.style.color = '';
                }, 2000);
            } else {
                alert("Успешный вход! (Тест)");
            }
        }

        function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const terms = document.getElementById('terms').checked;

            if(!name || !phone) { alert("Заполните поля"); return; }
            if(!terms) { alert("Примите условия"); return; }

            alert("Регистрация успешна! (Тест)");
            showScreen('screen-welcome');
        }
    </script>
</body>
</html>
